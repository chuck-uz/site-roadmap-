server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # nginx doesn't know about Docker's host-side port mapping (e.g. 8090:80).
    # Without this, the automatic trailing-slash redirect (/roadmap -> /roadmap/)
    # emits an absolute Location header with the container's own port omitted,
    # which resolves to the wrong port/app on the host. Relative redirects let
    # the browser resolve against whatever host:port it actually used.
    absolute_redirect off;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(?:css|js|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
